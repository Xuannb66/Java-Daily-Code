# =============================================
# 应用配置 —— 开发阶段使用 H2 内存数据库
# =============================================

spring:
  application:
    name: ai-study-notes

  # ── H2 内存数据库（无需安装，开箱即用）──
  datasource:
    url: jdbc:h2:mem:study_notes;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # JPA / Hibernate 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # 启用 H2 控制台（浏览器访问 http://localhost:8080/h2-console）
  h2:
    console:
      enabled: true
      path: /h2-console

  # Thymeleaf 模板配置
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

# 服务端口
server:
  port: 8080

# 日志级别
logging:
  level:
    com.example.notes: DEBUG
